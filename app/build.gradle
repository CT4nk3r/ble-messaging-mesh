plugins {
    id "com.android.application"
}

android {
    namespace "com.offline.btmesh"
    compileSdk 35

    defaultConfig {
        applicationId "com.offline.btmesh"
        minSdk 26
        targetSdk 35
        versionCode 3
        versionName "0.1.2"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation "com.google.zxing:core:3.5.3"
}
